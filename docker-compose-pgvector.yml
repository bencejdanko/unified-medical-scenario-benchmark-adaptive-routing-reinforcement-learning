services:
  pgvector:
    image: pgvector/pgvector:pg17
    container_name: medrag_pgvector
    environment:
      POSTGRES_DB: medrag
      POSTGRES_USER: medrag
      POSTGRES_PASSWORD: medrag
    ports:
      - "5433:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medrag -d medrag"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgvector_data:
